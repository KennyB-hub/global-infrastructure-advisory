seven-os-sector-system:
  version: 1.0.0
  description: >
    Unified sector system manifest for Seven‑OS. Supports dynamic loading,
    auditing, routing, compliance, AI reasoning, and mission orchestration
    across all infrastructure sectors and their sub‑workers.

  # ---------------------------------------------------------
  # ROOTS
  # ---------------------------------------------------------
  roots:
    - seven-os/sector
    - seven-os/sector/meta
    - seven-os/sector/engines
    - seven-os/sector/workers
    - seven-os/sector/compliance
    - seven-os/sector/missions
    - seven-os/sector/interop
    - seven-os/sector/ai

  # ---------------------------------------------------------
  # SECTOR DEFINITIONS (22 infrastructure sectors)
  # ---------------------------------------------------------
  sectors:
    roads:
      folder: seven-os/sector/roads
      workers: auto-discover
      engine: seven-os/sector/engines/roads-engine.js
      compliance: seven-os/sector/compliance/roads.js
      missions: seven-os/sector/missions/roads.json
      ai: seven-os/sector/ai/roads-ai.js

    bridges:
      folder: seven-os/sector/bridges
      workers: auto-discover
      engine: seven-os/sector/engines/bridges-engine.js
      compliance: seven-os/sector/compliance/bridges.js
      missions: seven-os/sector/missions/bridges.json
      ai: seven-os/sector/ai/bridges-ai.js

    telecom:
      folder: seven-os/sector/telecom
      workers: auto-discover
      engine: seven-os/sector/engines/telecom-engine.js
      compliance: seven-os/sector/compliance/telecom.js
      missions: seven-os/sector/missions/telecom.json
      ai: seven-os/sector/ai/telecom-ai.js

