  # ---------------------------------------------------------
  # WORKER DISCOVERY
  # ---------------------------------------------------------
  worker-discovery:
    mode: recursive
    pattern: "*.worker.js"
    auto-register: true
    auto-audit: true

  # ---------------------------------------------------------
  # AUDIT REQUIREMENTS
  # ---------------------------------------------------------
  audit:
    deterministic: true
    worker-validation: true
    engine-validation: true
    mission-validation: true
    compliance-validation: true
    ai-validation: true
    interop-validation: true
    multipliers-validation: true
