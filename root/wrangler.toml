###############################
# MAIN PLATFORM WORKER
###############################
name = "global-infrastructure-advisory"
main = "src/index.ts"
[env.debug]
name = "gia-debug"
main = "src/ai-worker/debug-worker.js"

compatibility_date = "2024-12-01"

###############################
# AI ENGINE WORKER
###############################
[[services]]
name = "gia-deep-mind-2100"
main = "src/ai-worker/gia-deep-mind-2100.js"
route = "yourdomain.com/ai/*"

###############################
