name = "global-infrastructure-advisory.global-infrastructure-advisory.workers.dev"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Durable Objects
[[durable_objects.bindings]]
name = "GLOBAL_STATE"
class_name = "GlobalState"

# KV Namespaces
[[kv_namespaces]]
binding = "GLOBAL_CACHE"
id = "97426b03b961419ba8ca6df016a6039f_ID_97426b03b961419ba8ca6df016a6039f"

# R2 Buckets
[[r2_buckets]]
binding = "GLOBAL_STORAGE"
bucket_name = "global-storage"

# D1 Database
[[d1_databases]]
binding = "GLOBAL_DB"
database_name = "global-db"
database_id = "0e5832f8-ca6a-4796-8053-429f3bfdbbee_ID_00000018-00000000-0000504f-23d0b62fedba49aa64c25f2e202f8ec2"

name = "gia-deep-mind-2100"
main = "src/ai-worker/gia-deep-mind-2100.js"
compatibility_date = "2024-12-01"

# Bindings for your AI engine
[ai]
binding = "AI"

# Environment variables for trust zones, auditing, etc.
[vars]
GIA_VERSION = "2100"
DEFAULT_TRUST_ZONE = "public"

# Environment Variables
[vars]
ENVIRONMENT = "production"
PLATFORM_VERSION = "1.0.0"

# D1 Database
[[d1_databases]]
binding = "GLOBAL_DB"
database_name = "global-db"
database_id = "c12374bc-f828-481a-aeaa-27822f7aaea3_ID_0000000e-00000002-0000504f-c94fdb368788110e99a01cd9f5728ba9

# D1 Database
[[d1_databases]]
