# D1 Database
[[d1_databases]]
binding = "GLOBAL_DB"
database_name = "global-db"
database_id = "701e8250-541c-474a-b44f-d0abfe9ab7ef_ID_00000005-00000000-0000504f-2cfcae0220f6d3b39e3f4f10fcc35821

[assets]
directory = "./public"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

🔹 Basic Online Check 
bashcurl -X GET "https://global-infrastructure-advisory.global-infrastructure-advisory.workers.dev" \
  -H "Accept: application/json"
🔹 Standard AI Query
bash
curl -X POST "https://global-infrastructure-advisory.global-infrastructure-advisory.workers.dev" \
  -H "Content-Type: application/json" \
  -d '{
    "query": "Run system diagnostics",
    "trustZone": "public"
  }'
🔹 Internal Trust Zone
bash
curl -X POST "https://global-infrastructure-advisory.global-infrastructure-advisory.workers.dev" \
  -H "Content-Type: application/json" \
  -d '{
    "query": "List internal modules",
    "trustZone": "internal"
  }'
🔹 Admin Trust Zone
bash
curl -X POST "https://global-infrastructure-advisory.global-infrastructure-advisory.workers.dev" \
  -H "Content-Type: application/json" \
  -d '{
    "query": "Show audit log tail",
    "trustZone": "admin"
  }'
🔹 Invalid JSON (Failure Mode Test)
bash
curl -X POST "https://global-infrastructure-advisory.global-infrastructure-advisory.workers.dev" \
  -H "Content-Type: application/json" \
  -d 'INVALID_JSON'
🔹 Missing Query Field
bash
curl -X POST "https://global-infrastructure-advisory.global-infrastructure-advisory.workers.dev" \
  -H "Content-Type: application/json" \
  -d '{}'
🔹 Stress Test (Large Payload)
bash
curl -X POST "https://global-infrastructure-advisory.global-infrastructure-advisory.workers.dev" \
  -H "Content-Type: application/json" \
  -d '{
    "query": "'"$(printf 'A%.0s' {1..5000})"'",
    "trustZone": "public"
  }'
