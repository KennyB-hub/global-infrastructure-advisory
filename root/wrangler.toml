###############################
# MAIN PLATFORM WORKER (The Governor)
###############################
name = "global-infrastructure-advisory"
main = "src/index.js" # Changed .ts to .js to match your files
compatibility_date = "2024-12-01"

# The Heartbeat Trigger
[triggers]
crons = ["*/5 * * * *"]

###############################
# GLOBAL DATA STORAGE
###############################
[[d1_databases]]
binding = "GLOBAL_DB"
database_name = "global-db"
database_id = "c12374bc-f828-481a-aeaa-27822f7aaea3" # Use your primary ID

[[kv_namespaces]]
binding = "GLOBAL_CACHE"
id = "97426b03b961419ba8ca6df016a6039f"

# Programming Vault (To be linked to GitHub later)
[[kv_namespaces]]
binding = "PROGRAMMING_VAULT"
id = "YOUR_NEW_KV_ID_HERE" # Create a new namespace in the dashboard for this

###############################
# SERVICE BINDINGS (Internal Engines)
###############################
[[services]]
binding = "DEEP_MIND_AI"
service = "gia-deep-mind-2100"

[[services]]
binding = "EMERGENCY_ROUTER"
service = "emergency-router"

[env.debug]
name = "gia-debug"
main = "src/ai-worker/debug-worker.js"
