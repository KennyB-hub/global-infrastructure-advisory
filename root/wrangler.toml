name = "global-infrastructure-advisory"
main = "src/ai/workers/system-worker/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "GLOBAL_DB"
database_name = "global-db"
database_id = "c12374bc-f828-481a-aeaa-27822f7aaea3"

[[kv_namespaces]]
binding = "GLOBAL_CACHE"
id = "97426b03b961419ba8ca6df016a6039f"

[[kv_namespaces]]
binding = "PROGRAMMING_VAULT"
id = "YOUR_NEW_KV_ID_HERE"

[[services]]
binding = "DEEP_MIND_AI"
service = "gia-deep-mind-2100"

[[services]]
binding = "EMERGENCY_ROUTER"
service = "emergency-router"

[env.debug]
name = "gia-debug"
main = "src/ai/workers/system-worker/debug-worker.js"
