<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GIA Admin Access</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at 20% 20%, #0a0f1f, #000);
    font-family: "Orbitron", sans-serif;
    color: #9fd4ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .panel {
    background: rgba(10, 20, 40, 0.75);
    border: 1px solid #1e90ff;
    box-shadow: 0 0 25px #1e90ff55;
    padding: 40px;
    width: 380px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
  }

  h1 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 22px;
    letter-spacing: 2px;
    color: #7fc8ff;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: rgba(0, 10, 25, 0.8);
    border: 1px solid #1e90ff;
    border-radius: 6px;
    color: #9fd4ff;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
  }

  input:focus {
    border-color: #4ecbff;
    box-shadow: 0 0 10px #4ecbff55;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #1e90ff;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 15px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #4ecbff;
    box-shadow: 0 0 15px #4ecbff88;
  }

  #status {
    margin-top: 20px;
    text-align: center;
    font-size: 14px;
    color: #ff6b6b;
  }
</style>

</head>
<body>

<div class="panel">
  <h1>ADMIN ACCESS</h1>

  <form id="loginForm">
    <input id="email" type="email" placeholder="Admin Email" required />
    <input id="password" type="password" placeholder="Password" required />
    <input id="otp" type="text" placeholder="One-Time Key" required />
    <button type="submit">ENTER</button>
  </form>
  
  <div id="status"></div>
</div>

<script src="/admin/login.js"></script>
</body>
</html>
