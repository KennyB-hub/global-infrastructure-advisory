<div id="resume-nav"></div>

<section class="resume-section">
  <h2>Resume Builder</h2>

  <div id="resume-form">
    <label>Name</label>
    <input id="res-name">

    <label>Role</label>
    <input id="res-role">

    <label>Summary</label>
    <textarea id="res-summary"></textarea>

    <label>Skills</label>
    <textarea id="res-skills"></textarea>

    <label>Experience</label>
    <textarea id="res-experience"></textarea>

    <button id="btn-generate">Generate Resume</button>
  </div>

  <pre id="resume-output"></pre>
</section>
