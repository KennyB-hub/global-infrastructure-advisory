<section class="system-section">
  <h1>Cyber Defense Dashboard</h1>

  <!-- STATUS BAR -->
  <div id="cyber-status" class="status-bar">Loading…</div>

  <!-- SECURITY EVENTS -->
  <section class="sector-grid">
    <header class="sector-header">
      <h2>Security Events</h2>
      <button id="btn-cyber-refresh" class="btn-primary">Refresh</button>
    </header>
    <div id="cyber-events" class="sector-grid-body"></div>
  </section>

  <!-- CYBER ENGINE ANALYSIS -->
  <section class="sector-grid">
    <header class="sector-header">
      <h2>Cyber Engine Analysis</h2>
      <button id="btn-cyber-analyze" class="btn-primary">Run Analysis</button>
    </header>
    <div id="cyber-analysis" class="sector-grid-body"></div>
  </section>

  <!-- AUTO‑BLOCK DASHBOARD -->
  <section id="cyber-blocks-section" class="sector-grid">
    <header class="sector-header">
      <h2>Cyber Auto‑Blocks</h2>
      <button id="btn-cyber-blocks-refresh" class="btn-primary">Refresh</button>
    </header>
    <div id="cyber-blocks-list" class="sector-grid-body"></div>
  </section>
</section>
