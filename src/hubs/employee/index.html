<!DOCTYPE html>
<html lang="en" class="theme-employee">
<head>
  <meta charset="UTF-8" />
  <title>GIA — Employee Hub</title>
  <link rel="stylesheet" href="/assets/css/_root.css" />
  <link rel="stylesheet" href="/assets/css/themes.css" />
</head>
<body>
  <div class="page-shell">
    <header class="top-nav">
      <div class="brand-block">
        <img src="/assets/logo.svg" class="brand-logo" alt="GIA" />
        <div>
          <div class="brand-text">Global Infrastructure Advisory</div>
          <div class="brand-text">Employee Hub</div>
        </div>
      </div>
      <nav class="nav-links" id="employee-nav"></nav>
    </header>

    <section class="hero-shell">
      <div class="hero-main">
        <div class="hero-kicker">
          <span class="hero-kicker-dot"></span>
          Workforce Interface
        </div>
        <h1 class="hero-title">
          AI‑enhanced <span>workflows</span> for infrastructure teams.
        </h1>
        <p class="hero-body">
          See your tasks, messages, and system context in a single 2050‑grade interface.
        </p>
        <div class="hero-actions">
          <button class="btn-primary" id="btn-load-tasks">My Tasks</button>
          <button class="btn-secondary" id="btn-load-messages">Messages</button>
        </div>
      </div>

      <div class="hero-orbit">
        <canvas id="hologram-canvas"></canvas>
        <div id="agri-logs">
          <div id="employee-logs"></div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <div>
          <div class="section-title">Tasks</div>
          <div class="section-sub">AI‑prioritized work items</div>
        </div>
        <div class="pill-muted" id="employee-meta">No tasks loaded</div>
      </div>
      <div class="sectors-grid" id="employee-grid"></div>
    </section>

    <footer class="page-footer">
      <span>GIA Employee Hub · 2050 Interface</span>
      <span id="employee-footer-status">AI link: connecting…</span>
    </footer>
  </div>

  <script type="module" src="/hubs/employee/dashboard.js"></script>
</body>
</html>
