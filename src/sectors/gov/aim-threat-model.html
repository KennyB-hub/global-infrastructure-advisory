<section class="gov-section">
  <h1>AIM Threat Modeling Mode</h1>

  <div id="aim-status" class="status-bar">Ready.</div>

  <!-- Attack Surface -->
  <section class="sector-grid">
    <header class="sector-header">
      <h2>Attack Surface</h2>
    </header>
    <textarea id="aim-attack-surface" class="input-block" placeholder="Describe the system, assets, or surface to model..."></textarea>
  </section>

  <!-- Entry Points -->
  <section class="sector-grid">
    <header class="sector-header">
      <h2>Entry Points</h2>
    </header>
    <textarea id="aim-entry-points" class="input-block" placeholder="List entry points, ports, workflows, trust-zones..."></textarea>
  </section>

  <!-- Defenses -->
  <section class="sector-grid">
    <header class="sector-header">
      <h2>Existing Defenses</h2>
    </header>
    <textarea id="aim-defenses" class="input-block" placeholder="Describe firewalls, guards, policies, rate limits, etc."></textarea>
  </section>

  <!-- Run Model -->
  <section class="sector-grid">
    <header class="sector-header">
      <h2>Run Threat Model</h2>
      <button id="btn-aim-run" class="btn-primary">Run Model</button>
    </header>
    <div id="aim-model-output" class="sector-grid-body"></div>
  </section>

  <!-- AIM Defense Mode -->
  <section class="sector-grid">
    <header class="sector-header">
      <h2>AIM Defense Mode</h2>
      <button id="btn-aim-defense" class="btn-primary">Simulate Defense</button>
    </header>
    <div id="aim-defense-output" class="sector-grid-body"></div>
  </section>

  <!-- Cyber Defense Execution -->
  <section class="sector-grid">
    <header class="sector-header">
      <h2>Execute Cyber Defense</h2>
      <button id="btn-cyber-exec" class="btn-danger">Execute Defense Action</button>
    </header>
    <div id="aim-cyber-output" class="sector-grid-body"></div>
  </section>
</section>
