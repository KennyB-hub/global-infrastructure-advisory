name = "gia-deep-mind-2100"
main = "src/ai-worker/gia-deep-mind-2100.js"
compatibility_date = "2024-12-01"

# AI Binding
[ai]
binding = "AI"

# Core Vars
[vars]
GIA_VERSION = "2100"
DEFAULT_TRUST_ZONE = "public"
ENVIRONMENT = "production"
PLATFORM_VERSION = "1.0.0"

# KV Namespace (A-Team)
[[kv_namespaces]]
binding = "GLOBAL_CACHE"
id = "97426b03b961419ba8ca6df016a6039f"

# D1 Database (AI Side — V12 ONLY)
[[d1_databases]]
binding = "V12_ENGINE"
database_name = "v12"
database_id = "701e8250-541c-474a-b44f-d0abfe9ab7ef"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
persist = true
invocation_logs = true
head_sampling_rate = 1

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
