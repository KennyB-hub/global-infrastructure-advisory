name: "Seven‑OS Doctor Check"

on:
  pull_request:
    branches: [ "main" ]

jobs:
  doctor:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Seven‑OS Doctor
        run: npm run doctor
