<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* 1. Reset & Base (Space-Grade Foundation) */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: #020617; 
    color: #ffffff; 
    font-family: 'Inter', sans-serif; 
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* 2. Responsive Container */
  .container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem;
  }

  /* 3. The Glassmorphism Sync (Mobile-First) */
  .glass-panel {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: transform 0.3s ease, border 0.3s ease;
  }

  /* 4. Responsive Grid (Stacks on Mobile, Side-by-side on Desktop) */
  .hub-grid {
    display: grid;
    grid-template-columns: 1fr; /* Default: Single Column for Mobile */
    gap: 1rem;
  }

  @media (min-width: 768px) {
    .hub-grid {
      grid-template-columns: repeat(2, 1fr); /* 2 Columns for Tablets */
    }
  }

  @media (min-width: 1024px) {
    .hub-grid {
      grid-template-columns: repeat(4, 1fr); /* 4 Columns for Desktop */
    }
  }

  /* 5. Touch-Optimized Buttons */
  .neon-btn {
    display: inline-block;
    width: 100%; /* Full width on mobile for easy thumb-tapping */
    padding: 12px;
    background: transparent;
    border: 1px solid #00f2ff;
    color: #00f2ff;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    text-align: center;
  }

  @media (min-width: 768px) {
    .neon-btn { width: auto; padding: 10px 25px; }
  }
</style>

<style>
  :root { --glass: rgba(15, 23, 42, 0.7); --neon: #ffaa00; }
  body { background: #020617; color: white; font-family: 'JetBrains Mono', monospace; }
  .hud-container { display: grid; grid-template-columns: 1fr 3fr; gap: 20px; padding: 20px; }
  .glass-card { 
    background: var(--glass); backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 20px;
  }
  .status-line { border-left: 3px solid var(--neon); padding-left: 10px; margin-bottom: 10px; }
</style>
<div class="hud-container">
  <div class="glass-card">
    <h2 style="color: var(--neon)">GOV_STATUS</h2>
    <div class="status-line">3D Mapping: ONLINE</div>
    <div class="status-line">Telemetry: ACTIVE</div>
  </div>
  <div class="glass-card">
    <h1>Strategic Infrastructure Dashboard</h1>
    <p>Visualizing Global Infrastructure Assets (Epoch 2050)</p>
    <div style="height: 300px; border: 1px dashed var(--neon); display: flex; align-items: center; justify-content: center;">
       [SYSTEM_MAPPING_FEED_ACTIVE]
    </div>
  </div>
</div>
