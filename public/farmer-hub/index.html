<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* 1. Reset & Base (Space-Grade Foundation) */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: #020617; 
    color: #ffffff; 
    font-family: 'Inter', sans-serif; 
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* 2. Responsive Container */
  .container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem;
  }

  /* 3. The Glassmorphism Sync (Mobile-First) */
  .glass-panel {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: transform 0.3s ease, border 0.3s ease;
  }

  /* 4. Responsive Grid (Stacks on Mobile, Side-by-side on Desktop) */
  .hub-grid {
    display: grid;
    grid-template-columns: 1fr; /* Default: Single Column for Mobile */
    gap: 1rem;
  }

  @media (min-width: 768px) {
    .hub-grid {
      grid-template-columns: repeat(2, 1fr); /* 2 Columns for Tablets */
    }
  }

  @media (min-width: 1024px) {
    .hub-grid {
      grid-template-columns: repeat(4, 1fr); /* 4 Columns for Desktop */
    }
  }

  /* 5. Touch-Optimized Buttons */
  .neon-btn {
    display: inline-block;
    width: 100%; /* Full width on mobile for easy thumb-tapping */
    padding: 12px;
    background: transparent;
    border: 1px solid #00f2ff;
    color: #00f2ff;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    text-align: center;
  }

  @media (min-width: 768px) {
    .neon-btn { width: auto; padding: 10px 25px; }
  }
</style>

<style>
  :root { --glass: rgba(10, 20, 15, 0.7); --agri-neon: #39FF14; }
  body { background: #010a01; color: #f0f0f0; font-family: 'Inter', sans-serif; margin: 0; }
  .agri-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
  .glass-card { 
    background: var(--glass); backdrop-filter: blur(12px);
    border: 1px solid rgba(57, 255, 20, 0.2); border-radius: 15px; padding: 25px;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
  }
  .bio-stat { color: var(--agri-neon); font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; }
</style>
<div class="agri-grid">
  <div class="glass-card">
    <h2 style="color: var(--agri-neon);">Crop Telemetry</h2>
    <p>Satellite NDVI Index: <span class="bio-stat">0.82 (OPTIMAL)</span></p>
    <p>Soil Moisture: <span class="bio-stat">24%</span></p>
  </div>
  <div class="glass-card">
    <h2>Agri-Tech AI</h2>
    <p>Predictive Pest Analysis: <span style="color: #ffaa00;">NO THREATS</span></p>
    <button style="background: var(--agri-neon); border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer;">DEPLOY DRONE SQUAD</button>
  </div>
</div>
