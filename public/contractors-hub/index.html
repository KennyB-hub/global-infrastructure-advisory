<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* 1. Reset & Base (Space-Grade Foundation) */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: #020617; 
    color: #ffffff; 
    font-family: 'Inter', sans-serif; 
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* 2. Responsive Container */
  .container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem;
  }

  /* 3. The Glassmorphism Sync (Mobile-First) */
  .glass-panel {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: transform 0.3s ease, border 0.3s ease;
  }

  /* 4. Responsive Grid (Stacks on Mobile, Side-by-side on Desktop) */
  .hub-grid {
    display: grid;
    grid-template-columns: 1fr; /* Default: Single Column for Mobile */
    gap: 1rem;
  }

  @media (min-width: 768px) {
    .hub-grid {
      grid-template-columns: repeat(2, 1fr); /* 2 Columns for Tablets */
    }
  }

  @media (min-width: 1024px) {
    .hub-grid {
      grid-template-columns: repeat(4, 1fr); /* 4 Columns for Desktop */
    }
  }

  /* 5. Touch-Optimized Buttons */
  .neon-btn {
    display: inline-block;
    width: 100%; /* Full width on mobile for easy thumb-tapping */
    padding: 12px;
    background: transparent;
    border: 1px solid #00f2ff;
    color: #00f2ff;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    text-align: center;
  }

  @media (min-width: 768px) {
    .neon-btn { width: auto; padding: 10px 25px; }
  }
</style>

<style>
  :root { --glass: rgba(20, 20, 30, 0.8); --work-neon: #FFA500; }
  body { background: #0a0a0c; color: #fff; font-family: 'JetBrains Mono', monospace; }
  .zone-layout { display: flex; flex-direction: column; align-items: center; padding: 50px; }
  .tactical-panel { 
    width: 80%; background: var(--glass); backdrop-filter: blur(10px);
    border: 1px solid var(--work-neon); border-left: 10px solid var(--work-neon);
    padding: 30px; border-radius: 5px;
  }
</style>
<div class="zone-layout">
  <div class="tactical-panel">
    <h1>WORK ZONE DELTA-9</h1>
    <p>Autonomous Layout Status: <span style="color: var(--work-neon);">PRINTING [74%]</span></p>
    <hr style="border-color: rgba(255, 165, 0, 0.3);">
    <div style="display: flex; justify-content: space-between;">
      <span>Excavator Fleet: ACTIVE</span>
      <span>Safety Protocol: LEVEL 1</span>
    </div>
  </div>
</div>
