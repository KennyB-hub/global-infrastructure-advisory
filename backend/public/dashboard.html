<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Seven — System State</title>
  <style>
    body {
      margin:0;
      background: radial-gradient(circle at 20% 20%, #0a0f1f, #000);
      color:#9be7ff;
      font-family: 'Segoe UI', sans-serif;
      overflow-x:hidden;
    }
    .grid {
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(#0a1a2f 1px, transparent 1px),
        linear-gradient(90deg, #0a1a2f 1px, transparent 1px);
      background-size:40px 40px;
      opacity:0.15;
      pointer-events:none;
    }
    .container {
      padding:40px;
    }
    .card {
      background:rgba(0,20,40,0.65);
      border:1px solid #0ff;
      border-radius:10px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 0 20px #0ff3;
    }
    .title {
      font-size:22px;
      margin-bottom:10px;
      color:#00eaff;
      text-shadow:0 0 8px #00eaff;
    }
    .value {
      font-family:monospace;
      font-size:16px;
      margin-bottom:4px;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="container">
    <h1 class="title">Seven — Live System State</h1>
    <div id="root">Loading…</div>
  </div>

  <script>
    async function loadState() {
      try {
        const res = await fetch("/api/system/state");
        const json = await res.json();
        const p = json.payload;

        document.getElementById("root").innerHTML = `
          <div class="card">
            <div class="title">Connection</div>
            <div class="value">state: ${p.connection.state}</div>
            <div class="value">transport: ${p.connection.transport}</div>
            <div class="value">signal: ${p.connection.signalStrength ?? "n/a"}</div>
          </div>

          <div class="card">
            <div class="title">Hybrid Mode</div>
            <div class="value">${p.hybridMode}</div>
          </div>

          <div class="card">
            <div class="title">Satellite Continuity</div>
            <div class="value">mode: ${p.satelliteContinuity.mode}</div>
            <div class="value">notes: ${p.satelliteContinuity.notes ?? "—"}</div>
          </div>

          <div class="card">
            <div class="title">Geo Fallback</div>
            <div class="value">lat: ${p.geoFallback.lat}</div>
            <div class="value">lon: ${p.geoFallback.lon}</div>
            <div class="value">accuracy: ${p.geoFallback.accuracyMeters} m</div>
            <div class="value">source: ${p.geoFallback.source}</div>
          </div>

          <div class="card">
            <div class="title">Queue</div>
            <div class="value">depth: ${p.queue.depth}</div>
          </div>
        `;
      } catch {
        document.getElementById("root").innerHTML =
          "<div class='card'>Offline — showing last known state.</div>";
      }
    }

    loadState();
    setInterval(loadState, 5000);
  </script>
</body>
</html>
