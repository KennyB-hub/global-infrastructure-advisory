name: Scan - Repo Secrets & Licenses

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run secret scanner
        id: secret_scan
        run: |
          npm run scan:secrets
          echo "secret_scan_status=$?" >> $GITHUB_OUTPUT

      - name: Show secret report
        if: always()
        run: |
          if [ -f reports/secret-scan.json ]; then
            cat reports/secret-scan.json
          else
            echo "No secret report generated"
          fi

      - name: Run license scanner
        id: license_scan
        run: |
          npm run scan:licenses
          echo "license_scan_status=$?" >> $GITHUB_OUTPUT

      - name: Show license report
        if: always()
        run: |
          if [ -f reports/license-scan.json ]; then
            cat reports/license-scan.json
          else
            echo "No license report generated"
          fi

      - name: Fail on secret findings
        if: always()
        run: |
          if [ -f reports/secret-scan.json ]; then
            count=$(jq '.findings | length' reports/secret-scan.json)
            echo "Secret findings: $count"
            if [ "$count" -gt 0 ]; then
              echo "Secret scan failed: $count findings" && exit 1
            fi
          else
            echo "No secret report to check" && exit 1
          fi

      - name: Fail on license contamination (proprietary/GPL)
        if: always()
        run: |
          if [ -f reports/license-scan.json ]; then
            prop=$(jq '.findings.Proprietary | length' reports/license-scan.json)
            gpl=$(jq '.findings.GPL | length' reports/license-scan.json)
            echo "Proprietary files: $prop, GPL matches: $gpl"
            if [ "$prop" -gt 0 ]; then
              echo "License scan failed: proprietary license text found in $prop files" && exit 1
            fi
            if [ "$gpl" -gt 0 ]; then
              echo "Warning: GPL text found in $gpl files" >&2
            fi
          else
            echo "No license report to check" && exit 1
          fi

      - name: Upload reports (artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-scan-reports
          path: |
            reports/secret-scan.json
            reports/license-scan.json

      - name: Build PR comment
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p reports
          COMMENT=reports/pr-scan-comment.md
          echo "## Repository Scan Results" > $COMMENT
          if [ -f reports/secret-scan.json ]; then
            n=$(jq '.findings | length' reports/secret-scan.json)
            echo "\n### Secrets: $n findings" >> $COMMENT
            if [ "$n" -gt 0 ]; then
              echo '\n```' >> $COMMENT
              jq -r '.findings[] | "\(.file) — \(.type)"' reports/secret-scan.json | sed -n '1,20p' >> $COMMENT
              echo '\n```' >> $COMMENT
            else
              echo '\nNo secrets found.' >> $COMMENT
            fi
          else
            echo "\nNo secret report generated." >> $COMMENT
          fi

          if [ -f reports/license-scan.json ]; then
            prop=$(jq '.findings.Proprietary | length' reports/license-scan.json)
            gpl=$(jq '.findings.GPL | length' reports/license-scan.json)
            echo "\n### License scan\n- Proprietary matches: $prop\n- GPL matches: $gpl" >> $COMMENT
            if [ "$prop" -gt 0 ]; then
              echo "\nFiles with proprietary text:" >> $COMMENT
              jq -r '.findings.Proprietary[]' reports/license-scan.json | sed -n '1,20p' >> $COMMENT
            fi
          else
            echo "\nNo license report generated." >> $COMMENT
          fi

      - name: Create or update PR comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: reports/pr-scan-comment.md
          identifier: repo-scan-results
          edit-mode: replace
