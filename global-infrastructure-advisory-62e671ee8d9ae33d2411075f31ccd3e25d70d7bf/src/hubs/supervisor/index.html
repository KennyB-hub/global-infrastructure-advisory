<!DOCTYPE html>
<html lang="en" class="theme-employee">
<head>
  <meta charset="UTF-8" />
  <title>GIA — Supervisor Control Panel</title>
  <link rel="stylesheet" href="/assets/css/_root.css" />
  <link rel="stylesheet" href="/assets/css/themes.css" />
</head>
<body>
  <div class="page-shell">
    <header class="top-nav">
      <div class="brand-block">
        <img src="/assets/logo.svg" class="brand-logo" alt="GIA" />
        <div>
          <div class="brand-text">Global Infrastructure Advisory</div>
          <div class="brand-text">Supervisor Panel</div>
        </div>
      </div>
      <nav class="nav-links" id="sup-nav"></nav>
    </header>

    <section class="hero-shell">
      <div class="hero-main">
        <div class="hero-kicker">
          <span class="hero-kicker-dot"></span>
          Workforce Oversight
        </div>
        <h1 class="hero-title">
          Live <span>staff and job control</span>.
        </h1>
        <p class="hero-body">
          See who is active, assign jobs, and monitor sector coverage in real time.
        </p>
      </div>

      <div class="hero-orbit">
        <canvas id="hologram-canvas"></canvas>
        <div id="agri-logs">
          <div id="sup-logs"></div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <div>
          <div class="section-title">Staff</div>
          <div class="section-sub">Active workforce</div>
        </div>
        <div class="pill-muted" id="sup-meta-staff">No data</div>
      </div>
      <div class="sectors-grid" id="sup-staff-grid"></div>
    </section>

    <section class="section">
      <div class="section-header">
        <div>
          <div class="section-title">Jobs</div>
          <div class="section-sub">Unassigned work</div>
        </div>
        <div class="pill-muted" id="sup-meta-jobs">No data</div>
      </div>
      <div class="sectors-grid" id="sup-jobs-grid"></div>
    </section>

    <footer class="page-footer">
      <span>GIA Supervisor Panel · 2050 Interface</span>
      <span id="sup-footer-status">AI link: connecting…</span>
    </footer>
  </div>

  <script type="module" src="/hubs/supervisor/dashboard.js"></script>
</body>
</html>
